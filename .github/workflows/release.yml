name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          TAG=${{ github.ref_name }}
          if ! [[ $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG. Expected vX.Y.Z" && exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  docker-relay:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/relay:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/relay:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-agent:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agent/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/agent:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/agent:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-binaries:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Compile standalone binaries
        run: cd packages/agent && pnpm run compile:all

      - name: Generate checksums
        run: cd packages/agent/dist && sha256sum tadaima-agent-* > checksums.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: agent-binaries
          path: |
            packages/agent/dist/tadaima-agent-*
            packages/agent/dist/checksums.sha256

  npm-publish:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/agent/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Publish to npm
        run: cd packages/agent && pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: [ci, docker-relay, docker-agent, build-binaries, npm-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: agent-binaries
          path: release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "body=Initial release" >> $GITHUB_OUTPUT
          else
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD | head -50)
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: |
            ## Downloads

            | Platform | Binary |
            |---|---|
            | macOS (Apple Silicon) | [tadaima-agent-darwin-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tadaima-agent-darwin-arm64) |
            | macOS (Intel) | [tadaima-agent-darwin-x64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tadaima-agent-darwin-x64) |
            | Windows | [tadaima-agent-win-x64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tadaima-agent-win-x64.exe) |
            | Linux | [tadaima-agent-linux-x64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tadaima-agent-linux-x64) |

            [checksums.sha256](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.sha256)

            ## Docker Images

            ```bash
            # Relay (includes web app)
            docker pull ghcr.io/${{ github.repository }}/relay:${{ github.ref_name }}

            # Agent
            docker pull ghcr.io/${{ github.repository }}/agent:${{ github.ref_name }}
            ```

            ## Changes

            ${{ steps.changelog.outputs.body }}
          generate_release_notes: true
