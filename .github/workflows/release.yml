name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          TAG=${{ github.ref_name }}
          if ! [[ $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG. Expected vX.Y.Z" && exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  docker-relay:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/relay:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/relay:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-agent:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agent/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/agent:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/agent:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-binaries:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Compile standalone binaries
        run: cd packages/agent && pnpm run compile:all

      - name: Generate checksums
        run: cd packages/agent/dist && sha256sum tadaima-agent-* > checksums.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: agent-binaries
          path: |
            packages/agent/dist/tadaima-agent-*
            packages/agent/dist/checksums.sha256

  build-windows-installer:
    name: Build Windows MSI (unsigned beta)
    needs: ci
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # WinUI 3's MrtCore targets need MSBuild tasks that only exist
      # inside a Visual Studio install (UWP workload). build.ps1 invokes
      # msbuild.exe directly so those tasks resolve; this action puts
      # VS 2022's msbuild.exe on PATH.
      - uses: microsoft/setup-msbuild@v2

      - name: Install WiX v4
        shell: pwsh
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        shell: pwsh
        run: installers\v2\windows\build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: installer-msi
          path: installers/v2/windows/dist/Tadaima-Setup.msi
          if-no-files-found: error

  build-macos-installer:
    name: Build macOS DMG (signed + notarized)
    needs: ci
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Import signing certificates
        env:
          APP_P12: ${{ secrets.APPLE_DEVELOPER_ID_APP_P12 }}
          APP_P12_PASS: ${{ secrets.APPLE_DEVELOPER_ID_APP_PASSWORD }}
          INST_P12: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12 }}
          INST_P12_PASS: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_PASSWORD }}
        run: |
          if [ -z "$APP_P12" ]; then
            echo "No signing certificates configured — skipping"
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo "$APP_P12" | base64 --decode > $RUNNER_TEMP/app.p12
          echo "$INST_P12" | base64 --decode > $RUNNER_TEMP/inst.p12
          security import $RUNNER_TEMP/app.p12 -P "$APP_P12_PASS" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/inst.p12 -P "$INST_P12_PASS" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

      - name: Build DMG
        env:
          DEVELOPER_ID_APP: ${{ secrets.APPLE_DEVELOPER_ID_APP_NAME }}
          DEVELOPER_ID_INSTALLER: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash installers/v2/macos/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: installer-dmg
          path: installers/v2/macos/dist/Tadaima-Setup.dmg
          if-no-files-found: error

  npm-publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/agent/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Strip workspace references before publish
        run: |
          cd packages/agent
          node -e "
            const pkg = require('./package.json');
            delete pkg.devDependencies['@tadaima/shared'];
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: cd packages/agent && npm publish --access public --provenance

  github-release:
    needs:
      - ci
      - docker-relay
      - docker-agent
      - build-binaries
      - build-windows-installer
      - build-macos-installer
      - npm-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: agent-binaries
          path: release-assets/

      - uses: actions/download-artifact@v4
        with:
          name: installer-msi
          path: release-assets/

      - uses: actions/download-artifact@v4
        with:
          name: installer-dmg
          path: release-assets/

      - name: Regenerate combined checksums
        run: |
          cd release-assets
          rm -f checksums.sha256
          sha256sum tadaima-agent-* Tadaima-Setup.msi Tadaima-Setup.dmg > checksums.sha256
          cat checksums.sha256

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "body=Initial release" >> $GITHUB_OUTPUT
          else
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD | head -50)
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: |
            ## Desktop Installers (Beta, unsigned)

            | Platform | Installer |
            |---|---|
            | Windows 10/11 (x64) | [Tadaima-Setup.msi](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Tadaima-Setup.msi) |
            | macOS 13+ (Universal) | [Tadaima-Setup.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Tadaima-Setup.dmg) |

            These bundle a Node runtime, install the agent, and register it to start on login.
            See [`installers/v2/README.md`](https://github.com/${{ github.repository }}/blob/main/installers/v2/README.md) for warning-dismissal steps.

            ## Agent Binaries

            | Platform | Binary |
            |---|---|
            | macOS (Apple Silicon) | [tadaima-agent-darwin-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tadaima-agent-darwin-arm64) |
            | macOS (Intel) | [tadaima-agent-darwin-x64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tadaima-agent-darwin-x64) |
            | Windows | [tadaima-agent-win-x64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tadaima-agent-win-x64.exe) |
            | Linux | [tadaima-agent-linux-x64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tadaima-agent-linux-x64) |

            [checksums.sha256](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.sha256)

            ## Docker Images

            ```bash
            # Relay (includes web app)
            docker pull ghcr.io/${{ github.repository }}/relay:${{ github.ref_name }}

            # Agent
            docker pull ghcr.io/${{ github.repository }}/agent:${{ github.ref_name }}
            ```

            ## Changes

            ${{ steps.changelog.outputs.body }}
          generate_release_notes: true
