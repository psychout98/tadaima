<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tadaima — Profile Picker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .logo {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }
  .logo span { color: #6366f1; }
  .subtitle {
    color: #888;
    font-size: 0.95rem;
    margin-bottom: 3rem;
  }
  .profile-heading {
    font-size: 1.3rem;
    font-weight: 500;
    margin-bottom: 2rem;
    color: #ccc;
  }
  .profiles {
    display: flex;
    gap: 2.5rem;
    margin-bottom: 3rem;
  }
  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .profile:hover { transform: scale(1.08); }
  .profile:hover .avatar { border-color: #6366f1; }
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    border: 3px solid transparent;
    transition: border-color 0.15s;
  }
  .avatar.indigo { background: #6366f120; }
  .avatar.green { background: #22c55e20; }
  .avatar.pink { background: #ec489920; }
  .avatar.blue { background: #3b82f620; }
  .avatar.orange { background: #f9731620; }
  .profile-name {
    font-size: 0.95rem;
    color: #ccc;
  }
  .profile-pin {
    font-size: 0.7rem;
    color: #888;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }
  .manage-link {
    color: #888;
    font-size: 0.85rem;
    text-decoration: none;
    transition: color 0.15s;
    cursor: pointer;
  }
  .manage-link:hover { color: #6366f1; }

  /* PIN Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 2rem;
    width: 340px;
    text-align: center;
  }
  .modal h3 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .modal p {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .pin-input-group {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .pin-digit {
    width: 48px;
    height: 56px;
    background: #242424;
    border: 1px solid #333;
    border-radius: 10px;
    color: #e0e0e0;
    font-size: 1.5rem;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }
  .pin-digit:focus { border-color: #6366f1; }
  .modal-actions {
    display: flex;
    gap: 0.75rem;
  }
  .modal-actions button {
    flex: 1;
    padding: 0.65rem;
    border-radius: 8px;
    border: none;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-cancel {
    background: #242424;
    color: #ccc;
  }
  .btn-cancel:hover { background: #2e2e2e; }
  .btn-confirm {
    background: #6366f1;
    color: #fff;
  }
  .btn-confirm:hover { background: #818cf8; }
</style>
</head>
<body>
  <div class="logo">ただいま <span>tadaima</span></div>
  <div class="subtitle">Who's watching?</div>

  <div class="profiles">
    <div class="profile" onclick="selectProfile('Noah')">
      <div class="avatar indigo">N</div>
      <div class="profile-name">Noah</div>
    </div>
    <div class="profile" onclick="showPinModal('Dad')">
      <div class="avatar green">D</div>
      <div class="profile-name">Dad</div>
      <div class="profile-pin">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        PIN
      </div>
    </div>
    <div class="profile" onclick="selectProfile('Sarah')">
      <div class="avatar pink">S</div>
      <div class="profile-name">Sarah</div>
    </div>
    <div class="profile" onclick="selectProfile('Mom')">
      <div class="avatar blue">M</div>
      <div class="profile-name">Mom</div>
    </div>
  </div>

  <a class="manage-link" onclick="alert('Opens admin login → admin panel')">Manage Profiles</a>

  <!-- PIN Modal -->
  <div class="modal-overlay" id="pinModal">
    <div class="modal">
      <h3 id="pinProfileName">Enter PIN for Dad</h3>
      <p>This profile is PIN-protected</p>
      <div class="pin-input-group">
        <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" autofocus>
        <input class="pin-digit" type="password" maxlength="1" inputmode="numeric">
        <input class="pin-digit" type="password" maxlength="1" inputmode="numeric">
        <input class="pin-digit" type="password" maxlength="1" inputmode="numeric">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closePinModal()">Cancel</button>
        <button class="btn-confirm" onclick="submitPin()">Enter</button>
      </div>
    </div>
  </div>

  <script>
    function selectProfile(name) {
      document.body.style.opacity = '0.5';
      setTimeout(() => alert(`Entering as ${name}... (would redirect to search page)`), 200);
      setTimeout(() => document.body.style.opacity = '1', 400);
    }
    function showPinModal(name) {
      document.getElementById('pinProfileName').textContent = `Enter PIN for ${name}`;
      document.getElementById('pinModal').classList.add('active');
      document.querySelector('.pin-digit').focus();
    }
    function closePinModal() {
      document.getElementById('pinModal').classList.remove('active');
      document.querySelectorAll('.pin-digit').forEach(d => d.value = '');
    }
    function submitPin() {
      const digits = [...document.querySelectorAll('.pin-digit')].map(d => d.value).join('');
      if (digits.length === 4) {
        closePinModal();
        selectProfile('Dad');
      }
    }
    // Auto-advance PIN digits
    document.querySelectorAll('.pin-digit').forEach((input, i, arr) => {
      input.addEventListener('input', () => {
        if (input.value && i < arr.length - 1) arr[i + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) arr[i - 1].focus();
      });
    });
  </script>
</body>
</html>
