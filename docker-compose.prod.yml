services:
  relay:
    build: .
    environment:
      - DATABASE_URL=postgres://tadaima:tadaima@postgres:5432/tadaima
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=tadaima
      - POSTGRES_USER=tadaima
      - POSTGRES_PASSWORD=tadaima
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tadaima"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
